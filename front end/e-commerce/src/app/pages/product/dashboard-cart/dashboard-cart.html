<section class="container py-4">
  <div class="card text-light border-secondary-subtle shadow-lg cart-shell">
    <div class="card-body p-3 p-md-4">
      <div class="mb-3 mb-md-4">
        <p class="text-secondary small text-uppercase fw-semibold mb-1">Cart Overview</p>
        <h2 class="h4 mb-0">Dashboard Cart</h2>
      </div>

      <div class="table-responsive rounded-3 border border-secondary-subtle">
        <table class="table table-dark table-hover align-middle mb-0">
          <thead>
            <tr>
              <th class="text-uppercase small text-secondary fw-semibold py-3">Product</th>
              <th class="text-uppercase small text-secondary fw-semibold py-3">Price</th>
              <th class="text-uppercase small text-secondary fw-semibold py-3">Quantity</th>
              <th class="text-uppercase small text-secondary fw-semibold py-3">Delete</th>
            </tr>
          </thead>

          <tbody>
            @for (item of products; track $index) {
              <tr>
                <td>
                  <div class="d-flex align-items-center gap-3">
                    <img
                      [src]="item.product.images[0]"
                      [alt]="item.product.title"
                      class="rounded-3 border border-secondary thumb-img"
                    />
                    <span class="fw-semibold">{{ item.product.title }}</span>
                  </div>
                </td>

                <td>
                  <span class="fw-bold price-accent">${{ item.product.price }}</span>
                </td>

                <td>
                  <div
                    class="d-inline-flex align-items-center gap-2 border border-secondary rounded-pill px-2 py-1 bg-black"
                  >
                    <button
                      type="button"
                      class="btn btn-outline-secondary btn-sm rounded-circle text-light"
                      style="width: 30px; height: 30px; padding: 0"
                      aria-label="Increase quantity"
                      (click)="incressQuantity(item.quantity + 1 ,item.product._id)"
                    >
                      +
                    </button>
                    <span class="badge text-bg-secondary">{{ item.quantity }}</span>
                    <button
                      type="button"
                      class="btn btn-outline-secondary btn-sm rounded-circle text-light"
                      style="width: 30px; height: 30px; padding: 0"
                      aria-label="Decrease quantity"
                      (click)="decressQuantity(item.quantity - 1 ,item.product._id)"
                      [disabled]="item.quantity <=1"
                      >
                      -
                    </button>
                  </div>
                </td>

                <td>
                  <button type="button" class="btn btn-danger btn-sm px-3 fw-semibold" (click)="deleteProduct(item.product._id)">
                    Delete
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      <div
        class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3 p-3 rounded-3 border border-secondary-subtle bg-dark"
      >
        <button type="button" class="btn btn-danger fw-semibold" (click)="deleteAllProduct()">Delete All Cart</button>
        <p class="mb-0 fs-5 fw-bold text-light">
          Total Amount:
          <span class="price-accent">${{ totalAmount }}</span>
        </p>
      </div>
    </div>
  </div>
</section>
